version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: mikeyrock-axebch-dashboard_server_1
      APP_PORT: 3000

  server:
    image: ghcr.io/mikeyrock/v0-miner-data-app:latest
    restart: on-failure
    stop_grace_period: 30s
    init: true
    environment:
      - AXEBCH_API_URL=${APP_AXEBCH_API_URL:-http://192.168.0.117:21212/api/node}
      - DISCORD_WEBHOOK_URL=${APP_DISCORD_WEBHOOK_URL:-}
      - PORT=3000
      - NODE_ENV=production
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  default:
    ipam:
      config:
        - subnet: 172.31.51.0/24
