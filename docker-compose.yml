services:
  axebch-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: axebch-dashboard
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3080}:3000"
    environment:
      # Direct LAN URL to your AxeBCH node — no Cloudflare proxy needed
      AXEBCH_API_URL: ${AXEBCH_API_URL:-}
      # Optional: Discord webhook for alerts (leave blank to disable)
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
    # Allows the container to reach LAN services like your AxeBCH node
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      # Healthcheck calls the API route; if AXEBCH_API_URL is set it will
      # proxy the upstream, otherwise it just confirms Next.js is running.
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
